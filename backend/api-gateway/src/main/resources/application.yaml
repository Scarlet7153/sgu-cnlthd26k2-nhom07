server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "https://*.*.railway.app"  # Cho phép các domain của frontend deploy trên Railway
            allowedOriginPatterns:
              - "*"                        # Mở tạm wildcard để tránh kẹt CORS lúc test
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # Auth Service — authentication and JWT
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        # User Service — user management
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        # Product Service — products, categories, reviews
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**, /api/categories/**, /api/reviews/**

        # Order Service — orders, cart, coupons
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**, /api/cart/**, /api/coupons/**

        # Payment Service
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: pcshop-jwt-secret-key-2026-must-be-at-least-256-bits-long-for-hs256

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
