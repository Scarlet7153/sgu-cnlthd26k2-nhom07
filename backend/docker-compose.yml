services:
  # =============================================
  # Infrastructure
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: pcshop-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  # =============================================
  # Spring Cloud Infrastructure
  # =============================================
  eureka-service:
    build: ./eureka-service
    container_name: eureka-service
    ports:
      - "8761:8761"
    environment:
      - SERVER_PORT=8761
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka/
    depends_on:
      eureka-service:
        condition: service_healthy
    networks:
      - backend-net

  # =============================================
  # Business Services
  # =============================================
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8085:8085"
    environment:
      - SERVER_PORT=8085
      - SPRING_DATA_MONGODB_URI=mongodb+srv://voduytoan:Voduytoan7153@pcshop.91getcf.mongodb.net/user_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka/
    depends_on:
      eureka-service:
        condition: service_healthy
    networks:
      - backend-net


  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATA_MONGODB_URI=mongodb+srv://voduytoan:Voduytoan7153@pcshop.91getcf.mongodb.net/user_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka/
    depends_on:
      eureka-service:
        condition: service_healthy
    networks:
      - backend-net

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATA_MONGODB_URI=mongodb+srv://voduytoan:Voduytoan7153@pcshop.91getcf.mongodb.net/product_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka/
    depends_on:
      eureka-service:
        condition: service_healthy
    networks:
      - backend-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - SPRING_DATA_MONGODB_URI=mongodb+srv://voduytoan:Voduytoan7153@pcshop.91getcf.mongodb.net/order_db
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka/
    depends_on:
      redis:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    networks:
      - backend-net

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - SPRING_DATA_MONGODB_URI=mongodb+srv://voduytoan:Voduytoan7153@pcshop.91getcf.mongodb.net/payment_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka/
    depends_on:
      eureka-service:
        condition: service_healthy
    networks:
      - backend-net

  # =============================================
  # AI Agent Service
  # =============================================
  agentic-rag-service:
    build: ./agentic-rag-service
    container_name: agentic-rag-service
    ports:
      - "8090:8090"
    env_file:
      - ./agentic-rag-service/.env
    environment:
      - EUREKA_SERVER=http://eureka-service:8761/eureka/
    depends_on:
      eureka-service:
        condition: service_healthy
    networks:
      - backend-net

# =============================================
# Volumes & Networks
# =============================================
networks:
  backend-net:
    driver: bridge
