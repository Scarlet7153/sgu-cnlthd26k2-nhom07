name: Test Suite

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'

jobs:
  # ==========================================
  # Backend Tests
  # ==========================================
  backend-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [auth-service, user-service, product-service, order-service, payment-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            !~/.m2/repository/com/pcshop
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests for ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        run: mvn clean test -B --fail-at-end

      - name: Generate JaCoCo coverage report
        working-directory: backend/${{ matrix.service }}
        run: mvn jacoco:report -B || true
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: |
            backend/${{ matrix.service }}/target/surefire-reports/
            backend/${{ matrix.service }}/target/site/jacoco/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/${{ matrix.service }}/target/site/jacoco/jacoco.xml
          flags: backend-${{ matrix.service }}
          name: ${{ matrix.service }}-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================
  # Frontend Unit Tests
  # ==========================================
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-unit-test-results
          path: |
            frontend/coverage/
            frontend/test-results/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: frontend/coverage
          flags: frontend-unit
          name: frontend-unit-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================
  # E2E Tests
  # ==========================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: pcshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      elasticsearch:
        image: elasticsearch:8.11.0
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Setup Java for backend
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # Build backend services
      - name: Build backend services
        run: |
          cd backend
          for service in eureka-service api-gateway auth-service user-service product-service order-service payment-service; do
            echo "Building $service..."
            cd $service && mvn clean package -DskipTests -B && cd ..
          done

      # Start backend services
      - name: Start backend services
        run: |
          cd backend
          java -jar eureka-service/target/*.jar > eureka.log 2>&1 &
          sleep 15
          java -jar api-gateway/target/*.jar --spring.profiles.active=dev > gateway.log 2>&1 &
          java -jar auth-service/target/*.jar --spring.profiles.active=dev > auth.log 2>&1 &
          java -jar user-service/target/*.jar --spring.profiles.active=dev > user.log 2>&1 &
          java -jar product-service/target/*.jar --spring.profiles.active=dev > product.log 2>&1 &
          java -jar order-service/target/*.jar --spring.profiles.active=dev > order.log 2>&1 &
          java -jar payment-service/target/*.jar --spring.profiles.active=dev > payment.log 2>&1 &
          
          # Wait for services to be healthy
          sleep 60
          
          # Check services health
          curl -f http://localhost:8761/actuator/health || echo "Eureka not ready"
          curl -f http://localhost:8080/actuator/health || echo "Gateway not ready"

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Build frontend
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

      # Install Playwright browsers
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox webkit

      # Run E2E tests
      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:8080
          CI: true
        timeout-minutes: 20

      # Upload test results
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/

      # Upload screenshots and videos
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results/**/*.png
            frontend/test-results/**/*.webm
            frontend/test-results/**/*.zip

      # Stop backend services
      - name: Stop backend services
        if: always()
        run: |
          pkill -f "java -jar" || true
          sleep 5

  # ==========================================
  # Coverage Report
  # ==========================================
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests, e2e-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download all coverage reports
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports
          pattern: test-results-*

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-unit-test-results
          path: coverage-reports/frontend

      # Create coverage summary
      - name: Create coverage summary
        run: |
          echo "# Coverage Report Summary" > coverage-summary.md
          echo "" >> coverage-summary.md
          echo "## Backend Services" >> coverage-summary.md
          
          for service in auth-service user-service product-service order-service payment-service; do
            if [ -f "coverage-reports/test-results-$service/target/site/jacoco/index.html" ]; then
              echo "- $service: [View Report](coverage-reports/test-results-$service/target/site/jacoco/)" >> coverage-summary.md
            fi
          done
          
          echo "" >> coverage-summary.md
          echo "## Frontend" >> coverage-summary.md
          echo "- Unit Tests: [View Report](coverage-reports/frontend/coverage/)" >> coverage-summary.md

      # Upload combined coverage report
      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.md

      # Comment PR with coverage summary
      - name: Comment PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # ==========================================
  # Test Summary
  # ==========================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests, e2e-tests]
    if: always()
    
    steps:
      - name: Test Summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Unit Tests | ${{ needs.frontend-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test reports are available as artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage reports uploaded to Codecov" >> $GITHUB_STEP_SUMMARY
