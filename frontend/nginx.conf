server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # ==========================
    # Serve static assets
    # ==========================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===============================================
    # Proxy requests API -> backend API gateway
    # ===============================================
    # Here we point to "api-gateway:8080".
    # In `docker-compose.yml`, the backend gateway is named `api-gateway`.
    location /api/ {
        # Proxy traffic directly to Spring Boot API gateway
        proxy_pass http://api-gateway:8080/;

        # Common headers for reverse proxy
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # IP Tracking
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
